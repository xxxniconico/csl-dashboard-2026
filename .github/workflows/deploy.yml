name: Deploy CSL Dashboard to GitHub Pages

on:
  # 定时触发：每天凌晨 2 点 (UTC+8) 自动更新
  schedule:
    - cron: '0 18 * * *'  # 18:00 UTC = 02:00 北京时间
  # 手动触发
  workflow_dispatch:
  # 推送触发
  push:
    branches:
      - main

# 设置权限
permissions:
  contents: write
  pages: write
  id-token: write

# 允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 1b. 恢复上次爬取数据（data/*.json 被 gitignore，无缓存则每次全量重爬）
      - name: Restore crawl data cache
        uses: actions/cache/restore@v4
        with:
          path: data
          key: csl-crawl-data-v1-${{ runner.os }}

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. 安装依赖
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium --with-deps

      # 4. 运行爬虫 (抓取最新数据)
      # CI 环境自动启用 --fast + --skip-complete：轻量等待 + 跳过已有事件的场次
      - name: Run Crawler
        id: crawl
        run: |
          python src/crawler/schedule_indexer.py
          python src/crawler/batch_event_crawler.py
        env:
          PYTHONIOENCODING: utf-8
          CI: true

      # 4a. 中足联 CFL 官方 API：进球/黄牌/红牌均带球员姓名；data_enricher 用此文件回填事件（与雷速页事件互补）
      - name: Fetch CFL API match events
        continue-on-error: true
        run: python src/crawler/cfl_api_event_crawler.py --output data/csl_matches_enriched_cfl.json
        env:
          PYTHONIOENCODING: utf-8

      # 4a1. 中足联注册球员名单（players/page）→ cfl_players_page_raw.json，仪表盘球员档案与头像
      - name: Fetch CFL players page roster
        continue-on-error: true
        run: python src/crawler/cfl_players_page_crawler.py --output data/cfl_players_page_raw.json
        env:
          PYTHONIOENCODING: utf-8

      # 4a2. 懂球帝 legacy 射手榜 + 助攻榜 → csl_player_stats_raw.json（normalize 合并助攻用）
      - name: Fetch player goal and assist rankings
        continue-on-error: true
        run: python src/crawler/csl_player_rank_api_crawler.py
        env:
          PYTHONIOENCODING: utf-8

      # 4b. 爬虫成功后立即写入缓存（后续 enrich/render/deploy 失败时仍会保留，避免下次全量重爬）
      - name: Save crawl data cache
        if: steps.crawl.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: data
          key: csl-crawl-data-v1-${{ runner.os }}

      # 4c. 由 csl_matches_enriched.json 等生成 all_seasons_unified_index.json（data_enricher 依赖此文件）
      - name: Unify seasons index
        run: python src/processor/data_unifier.py
        env:
          PYTHONIOENCODING: utf-8

      # 4d. 尝试从公开报道更新赛前扣分表（写入 data/；失败则仍使用仓库内 config/ 基准）
      - name: Fetch CFA preseason deductions
        continue-on-error: true
        run: python src/crawler/fetch_cfa_preseason_deductions.py
        env:
          PYTHONIOENCODING: utf-8

      # 5. 运行数据处理 (更新积分榜)
      - name: Process Data
        run: |
          python src/processor/data_enricher.py
        env:
          PYTHONIOENCODING: utf-8

      # 5b. 从比赛事件汇总球员进球/牌面，并写入 csl_normalized.json（供页面球员榜展示姓名）
      - name: Build player stats from events
        run: python src/processor/build_player_stats_from_events.py
        env:
          PYTHONIOENCODING: utf-8

      - name: Normalize CSL data
        run: python src/processor/normalize_csl_data.py
        env:
          PYTHONIOENCODING: utf-8

      # 6. 运行渲染器 (生成 HTML)
      - name: Render Dashboard
        run: |
          python src/renderer/web_renderer.py
        env:
          PYTHONIOENCODING: utf-8

      # 7. 部署到 GitHub Pages（首次必须在仓库 Settings → Pages 将 Source 设为 GitHub Actions，否则会 Not Found）
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
